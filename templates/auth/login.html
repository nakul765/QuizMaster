<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | QuizMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .bg-gradient { background: radial-gradient(circle at 50% 50%, #6366f1 0%, #4f46e5 50%, #1e1b4b 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-900 bg-gradient">
    
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-10 -left-10 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
        <div class="absolute -bottom-10 -right-10 w-96 h-96 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse" style="animation-delay: 2s;"></div>
    </div>

    <div class="glass w-full max-w-5xl rounded-[3rem] shadow-2xl flex overflow-hidden z-10 animate-[fadeInUp_0.8s_ease-out]">
        <div class="hidden lg:flex w-5/12 bg-indigo-900 p-12 flex-col justify-between text-white">
            <div class="flex items-center gap-2"><i data-lucide="layers" class="w-8 h-8"></i> <span class="text-2xl font-black">QuizMaster</span></div>
            <div class="space-y-6">
                <h2 class="text-4xl font-black">Welcome Back 👋</h2>
                <p class="text-indigo-200">Continue your learning journey and keep improving your skills every day.</p>
                <div class="space-y-4">
                    <div class="flex items-center gap-3 bg-white/10 p-4 rounded-xl border border-white/10"><i data-lucide="flame"></i> Daily Challenges</div>
                    <div class="flex items-center gap-3 bg-white/10 p-4 rounded-xl border border-white/10"><i data-lucide="award"></i> Unlock Achievements</div>
                </div>
            </div>
            <div class="text-sm text-indigo-300">© 2026 QuizMaster Pro</div>
        </div>

        <div class="w-full lg:w-7/12 p-12 lg:p-16">
            <h1 class="text-3xl font-black mb-2">Log in</h1>
            <p class="text-slate-500 mb-8">Enter your details to access your account.</p>
            
            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase mb-2">Email</label>
                    <input type="email" name="email" placeholder="example@gmail.com" required class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-2">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="password" placeholder="*********" required class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                        <button type="button" onclick="togglePass()" class="absolute right-4 top-4 text-slate-400"><i data-lucide="eye" id="eyeIcon"></i></button>
                    </div>
                </div>
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black hover:bg-indigo-700 shadow-xl transition-all">Log in</button>
            </form>

            <div class="relative flex items-center py-6">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink-0 mx-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Or Continue With</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <a href="/auth/google" class="block">
                <button type="button" class="w-full h-[52px] flex items-center justify-center gap-3 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md hover:bg-slate-50 transition-all font-bold text-slate-700">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Continue with Google
                </button>
            </a>
            <p class="text-center mt-6 text-sm font-bold text-slate-600">Don't have an account? <a href="/signup" class="text-indigo-600 hover:underline">Create Account</a></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function togglePass() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | QuizMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .bg-gradient { background: radial-gradient(circle at 50% 50%, #4f46e5 0%, #312e81 50%, #0f172a 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-900 bg-gradient">

    <div class="glass w-full max-w-5xl rounded-[3rem] shadow-2xl flex overflow-hidden z-10 animate-[fadeInUp_0.8s_ease-out]">
        <div class="hidden lg:flex w-5/12 bg-indigo-800 p-12 flex-col justify-center text-white">
            <h2 class="text-4xl font-black mb-8">Join the Future of Learning</h2>
            <div class="space-y-6">
                <div class="flex items-center gap-4"><div class="p-3 bg-white/10 rounded-xl"><i data-lucide="users"></i></div> <div><p class="text-2xl font-black">15K+</p><p class="text-indigo-200 text-sm">Students</p></div></div>
                <div class="flex items-center gap-4"><div class="p-3 bg-white/10 rounded-xl"><i data-lucide="book-open"></i></div> <div><p class="text-2xl font-black">5000+</p><p class="text-indigo-200 text-sm">Quizzes</p></div></div>
            </div>
        </div>

        <div class="w-full lg:w-7/12 p-12 lg:p-16">
            <h1 class="text-3xl font-black mb-2">Create Account</h1>
            <p class="text-slate-500 mb-8">Start your learning journey today.</p>
            
            <form action="/signup" method="POST" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="first_name" placeholder="First name" required class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                    <input type="text" name="last_name" placeholder="Last name" required class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <input type="email" name="email" placeholder="Email Address" required class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                
                <div class="relative">
                    <input type="password" name="password" id="pass" placeholder="Password" required class="w-full p-4 pr-12 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                    <button type="button" id="togglePass" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none">
                        <i data-lucide="eye" id="eyeIcon"></i>
                    </button>
                </div>
                
                <div class="h-2 w-full bg-slate-200 rounded-full mt-2"><div id="strength" class="h-full bg-indigo-600 w-1/4 rounded-full transition-all"></div></div>
                
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black hover:bg-indigo-700 shadow-xl transition-all mt-4">Create Account</button>
            </form>

            <div class="relative flex items-center py-6">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink-0 mx-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Or Continue With</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <a href="/auth/google" class="block">
                <button type="button" class="w-full h-[52px] flex items-center justify-center gap-3 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md hover:bg-slate-50 transition-all font-bold text-slate-700">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Sign up with Google
                </button>
            </a>
            <p class="text-center mt-6 text-sm font-bold text-slate-600">Already have an account? <a href="/login" class="text-indigo-600 hover:underline">Login</a></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        document.getElementById('pass').addEventListener('input', (e) => {
            const val = e.target.value.length;
            const bar = document.getElementById('strength');
            bar.style.width = Math.min(val * 10, 100) + '%';
        });

        // Toggle Password visibility behavior
        document.getElementById('togglePass').addEventListener('click', () => {
            const passInput = document.getElementById('pass');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            // Re-render lucide icon changes dynamically
            lucide.createIcons();
        });
    </script>
</body>
</html>
